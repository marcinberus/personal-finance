name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma clients
        run: npm run prisma:generate:all
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build:all

      - name: Run unit tests
        run: npm test

  integration-http-tests:
    name: Integration Tests (HTTP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npm run prisma:generate:all
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run HTTP integration tests (identity-service)
        run: npm run test:http:identity

      - name: Run HTTP integration tests (ledger-service)
        run: npm run test:http:ledger

      - name: Run HTTP integration tests (reporting-service)
        run: npm run test:http:reporting

  integration-database-tests:
    name: Integration Tests (Database)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npm run prisma:generate:all
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run database integration tests (identity-service)
        run: npm run test:database:identity

      - name: Run database integration tests (ledger-service)
        run: npm run test:database:ledger

      - name: Run database integration tests (reporting-service)
        run: npm run test:database:reporting
