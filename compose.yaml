name: personal-finance-local

x-shared-env: &shared-env
  JWT_SECRET: dev-jwt-secret
  JWT_EXPIRES_IN: 1d
  INTERNAL_SECRET: dev-internal-secret
  FRONTEND_ORIGIN: http://localhost:8080
  RABBITMQ_URL: amqp://rabbit:rabbit@rabbitmq:5672/personal_finance
  OUTBOX_PUBLISHER_ENABLED: 'true'
  OUTBOX_POLL_INTERVAL_MS: '2000'
  OUTBOX_PUBLISH_BATCH_SIZE: '50'
  IDENTITY_HTTP_TIMEOUT_MS: '1500'
  IDENTITY_HTTP_RETRIES: '1'

services:
  postgres:
    image: postgres:17
    container_name: personal-finance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_finance_db
    ports:
      - '5433:5432'
    volumes:
      - personal-finance-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d personal_finance_db']
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: personal-finance-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5051:80'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    container_name: personal-finance-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit
      RABBITMQ_DEFAULT_VHOST: personal_finance
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - personal-finance-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.local
    command: npm run prisma:migrate:all
    environment:
      <<: *shared-env
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=identity
      LEDGER_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=ledger
      REPORTING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=reporting
      IDENTITY_SERVICE_URL: http://identity-service:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    init: true
    command: npm run start:identity
    environment:
      <<: *shared-env
      IDENTITY_PORT: '3000'
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=identity
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - '3000:3000'
    restart: unless-stopped

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    init: true
    command: npm run start:ledger
    environment:
      <<: *shared-env
      LEDGER_PORT: '3001'
      LEDGER_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=ledger
      IDENTITY_SERVICE_URL: http://identity-service:3000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      identity-service:
        condition: service_started
    ports:
      - '3001:3001'
    restart: unless-stopped

  reporting-service:
    build:
      context: .
      dockerfile: Dockerfile.local
    init: true
    command: npm run start:reporting
    environment:
      <<: *shared-env
      REPORTING_PORT: '3002'
      REPORTING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/personal_finance_db?schema=reporting
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - '3002:3002'
    restart: unless-stopped

  frontend-legacy:
    image: nginx:1.27-alpine
    container_name: personal-finance-frontend-legacy
    volumes:
      - ./personal-finance-frontend:/usr/share/nginx/html:ro
      - ./personal-finance-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      identity-service:
        condition: service_started
      ledger-service:
        condition: service_started
      reporting-service:
        condition: service_started
    restart: unless-stopped

  frontend-ng:
    build:
      context: ./personal-finance-frontend-ng
      dockerfile: Dockerfile.dev
    container_name: personal-finance-frontend-ng
    working_dir: /app
    volumes:
      - ./personal-finance-frontend-ng:/app
      - personal-finance-frontend-ng-node-modules:/app/node_modules
    depends_on:
      identity-service:
        condition: service_started
      ledger-service:
        condition: service_started
      reporting-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    container_name: personal-finance-frontend
    volumes:
      - ./infra/nginx/frontend-edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/shell-config.js:/etc/nginx/shell-config.js:ro
    depends_on:
      frontend-legacy:
        condition: service_started
      frontend-ng:
        condition: service_started
    ports:
      - '8080:80'
    restart: unless-stopped

volumes:
  personal-finance-postgres-data:
  personal-finance-rabbitmq-data:
  personal-finance-frontend-ng-node-modules:
