<section class="auth-shell panel">
    <h2>Sign In</h2>
    <p class="muted">Use your identity-service account to access ledger and reporting data.</p>

    <form ng-submit="vm.submit()" class="grid">
        <div>
            <label for="login-email">Email</label>
            <input id="login-email" type="email" ng-model="vm.form.email" required />
        </div>
        <div>
            <label for="login-password">Password</label>
            <input id="login-password" type="password" ng-model="vm.form.password" minlength="8" required />
        </div>
        <button class="btn primary" type="submit" ng-disabled="vm.loading">
            {{ vm.loading ? 'Signing in...' : 'Sign In' }}
        </button>
    </form>

    <p class="spacer-top muted">
        No account yet?
        <a href="#/register">Create one</a>
    </p>
</section>
