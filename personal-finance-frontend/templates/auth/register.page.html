<section class="auth-shell panel">
    <h2>Create Account</h2>
    <p class="muted">Registration returns a JWT immediately and signs you in.</p>

    <form ng-submit="vm.submit()" class="grid">
        <div>
            <label for="register-email">Email</label>
            <input id="register-email" type="email" ng-model="vm.form.email" required />
        </div>
        <div>
            <label for="register-password">Password</label>
            <input id="register-password" type="password" ng-model="vm.form.password" minlength="8" required />
        </div>
        <button class="btn accent" type="submit" ng-disabled="vm.loading">
            {{ vm.loading ? 'Creating...' : 'Create Account' }}
        </button>
    </form>

    <p class="spacer-top muted">
        Already registered?
        <a href="#/login">Sign in</a>
    </p>
</section>
