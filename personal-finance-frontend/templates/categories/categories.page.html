<section class="grid cols-2">
    <article class="panel">
        <h2>Create Category</h2>
        <form ng-submit="vm.create()" class="grid">
            <div>
                <label for="cat-name">Name</label>
                <input id="cat-name" ng-model="vm.form.name" maxlength="100" required />
            </div>
            <div>
                <label for="cat-type">Type</label>
                <select id="cat-type" ng-model="vm.form.type" required>
                    <option value="income">income</option>
                    <option value="expense">expense</option>
                </select>
            </div>
            <button class="btn primary" type="submit">Create Category</button>
        </form>
    </article>

    <article class="panel">
        <h2>Category List</h2>
        <div class="row">
            <div>
                <label for="cat-filter">Filter by type</label>
                <select id="cat-filter" ng-model="vm.filterType" ng-change="vm.load()">
                    <option value="">all</option>
                    <option value="income">income</option>
                    <option value="expense">expense</option>
                </select>
            </div>
            <div style="align-self: end;">
                <button class="btn ghost" type="button" ng-click="vm.load()">Reload</button>
            </div>
        </div>

        <div class="table-wrap spacer-top">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="category in vm.categories track by category.id">
                        <td>{{ category.name }}</td>
                        <td>{{ category.type }}</td>
                        <td>{{ category.createdAt | date:'mediumDate' }}</td>
                    </tr>
                    <tr ng-if="!vm.categories.length">
                        <td colspan="3" class="muted">No categories yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
