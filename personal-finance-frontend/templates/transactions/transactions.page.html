<section class="grid">
    <article class="panel">
        <h2>Create Transaction</h2>
        <form ng-submit="vm.create()" class="grid">
            <div class="row cols-3">
                <div>
                    <label for="tx-category">Category</label>
                    <select id="tx-category" ng-model="vm.form.categoryId" required>
                        <option value="" disabled>Select category</option>
                        <option ng-repeat="category in vm.categories track by category.id" value="{{ category.id }}">
                            {{ category.name }} ({{ category.type }})
                        </option>
                    </select>
                </div>
                <div>
                    <label for="tx-amount">Amount</label>
                    <input id="tx-amount" type="number" min="0.01" step="0.01" ng-model="vm.form.amount" required />
                </div>
                <div>
                    <label for="tx-type">Type</label>
                    <select id="tx-type" ng-model="vm.form.type" required>
                        <option value="income">income</option>
                        <option value="expense">expense</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div>
                    <label for="tx-description">Description</label>
                    <input id="tx-description" maxlength="500" ng-model="vm.form.description" />
                </div>
                <div>
                    <label for="tx-date">Date</label>
                    <input id="tx-date" type="date" ng-model="vm.form.transactionDate" required />
                </div>
            </div>
            <button class="btn accent" type="submit">Create Transaction</button>
        </form>
    </article>

    <article class="panel">
        <h2>Transactions</h2>
        <div class="row cols-3">
            <div>
                <label for="tx-filter-type">Type</label>
                <select id="tx-filter-type" ng-model="vm.filters.type">
                    <option value="">all</option>
                    <option value="income">income</option>
                    <option value="expense">expense</option>
                </select>
            </div>
            <div>
                <label for="tx-filter-category">Category</label>
                <select id="tx-filter-category" ng-model="vm.filters.categoryId">
                    <option value="">all</option>
                    <option ng-repeat="category in vm.categories track by category.id" value="{{ category.id }}">
                        {{ category.name }}
                    </option>
                </select>
            </div>
            <div>
                <label for="tx-filter-from">From</label>
                <input id="tx-filter-from" type="date" ng-model="vm.filters.from" />
            </div>
            <div>
                <label for="tx-filter-to">To</label>
                <input id="tx-filter-to" type="date" ng-model="vm.filters.to" />
            </div>
            <div style="align-self: end;">
                <button class="btn ghost" type="button" ng-click="vm.loadTransactions()">Apply Filters</button>
            </div>
        </div>

        <div class="table-wrap spacer-top">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="item in vm.transactions track by item.id">
                        <td>{{ item.transactionDate | date:'yyyy-MM-dd' }}</td>
                        <td>{{ item.category.name }}</td>
                        <td>{{ item.type }}</td>
                        <td
                            ng-class="{ 'text-income': item.type === 'income', 'text-expense': item.type === 'expense' }">
                            {{ item.amount | localizedCurrency }}</td>
                        <td>{{ item.description || '-' }}</td>
                        <td>
                            <button class="btn danger" type="button" ng-click="vm.remove(item.id)">Delete</button>
                        </td>
                    </tr>
                    <tr ng-if="!vm.transactions.length">
                        <td colspan="6" class="muted">No transactions found for current filters.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </article>
</section>
