<header class="topbar">
    <div>
        <p class="eyebrow">{{ (shell && shell.eyebrow) || 'Distributed Finance' }}</p>
        <h1>{{ (shell && shell.title) || 'Personal Finance' }}</h1>
    </div>

    <div class="topbar-actions" ng-if="isAuthenticated">
        <span class="chip">{{ user.email }}</span>
        <button class="btn ghost" ng-click="onLogout()">Logout</button>
    </div>
</header>
