<div class="ambient-glow ambient-glow-a" aria-hidden="true"></div>
<div class="ambient-glow ambient-glow-b" aria-hidden="true"></div>

<main class="shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">{{ eyebrow }}</p>
      <h1>{{ title }}</h1>
    </div>

    @if (vm().isAuthenticated) {
      <div class="topbar-actions">
        <span class="chip">{{ vm().userEmail }}</span>
        <button class="btn ghost" type="button" (click)="logout()">Logout</button>
      </div>
    }
  </header>

  <nav class="tabs" aria-label="Feature routes">
    @for (item of vm().navTabs; track item) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <router-outlet></router-outlet>
</main>
