<section class="auth-shell panel">
    <h2>Create Account</h2>
    <p class="muted">Registration returns a JWT immediately and signs you in.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="grid" novalidate>
        <div>
            <label for="register-email">Email</label>
            <input id="register-email" type="email" formControlName="email" autocomplete="email" />
            <p class="field-error" *ngIf="isInvalid('email')">Enter a valid email address.</p>
        </div>

        <div>
            <label for="register-password">Password</label>
            <input id="register-password" type="password" formControlName="password" autocomplete="new-password" />
            <p class="field-error" *ngIf="isInvalid('password')">Use at least 8 characters.</p>
        </div>

        <button class="btn accent" type="submit" [disabled]="submitting">
            {{ submitting ? 'Creating...' : 'Create Account' }}
        </button>
    </form>

    <p class="spacer-top muted">
        Already registered?
        <a routerLink="/login">Sign in</a>
    </p>
</section>
