<section class="auth-shell panel">
    <h2>Sign In</h2>
    <p class="muted">Use your identity-service account to access ledger and reporting data.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="grid" novalidate>
        <div>
            <label for="login-email">Email</label>
            <input id="login-email" type="email" formControlName="email" autocomplete="email" />
            <p class="field-error" *ngIf="isInvalid('email')">Enter a valid email address.</p>
        </div>

        <div>
            <label for="login-password">Password</label>
            <input id="login-password" type="password" formControlName="password" autocomplete="current-password" />
            <p class="field-error" *ngIf="isInvalid('password')">Use at least 8 characters.</p>
        </div>

        <button class="btn primary" type="submit" [disabled]="submitting">
            {{ submitting ? 'Signing in...' : 'Sign In' }}
        </button>
    </form>

    <p class="spacer-top muted">
        No account yet?
        <a routerLink="/register">Create one</a>
    </p>
</section>
