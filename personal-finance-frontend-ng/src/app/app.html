<main class="shell">
  <header class="shell-header">
    <div>
      <p class="eyebrow">{{ eyebrow }}</p>
      <h1>{{ title }}</h1>
    </div>
    <p class="note">{{ note }}</p>
  </header>

  <nav class="tabs" aria-label="Feature routes">
    <a *ngFor="let item of navTabs" [attr.href]="item.href" [class.active]="isActiveTab(item.path, item.owner)">
      {{ item.label }}
    </a>
  </nav>

  <section class="view-wrap">
    <router-outlet></router-outlet>
  </section>
</main>
